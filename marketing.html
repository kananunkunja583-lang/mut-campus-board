<h1>🌿 Campus Marketing Hub</h1>

<div class="form-container">
    <input type="text" id="bizName" placeholder="Business Name">
    
    <select id="bizCategory">
        <option value="Food">Food 🍔</option>
        <option value="Fashion">Fashion 👕</option>
        <option value="Tech">Tech 💻</option>
        <option value="Services">Services 🛠</option>
        <option value="Events">Events 🎉</option>
    </select>

    <textarea id="bizDesc" placeholder="Business Description"></textarea>

    <input type="text" id="bizContact" placeholder="Contact Info (Phone / IG / Email)">

    <input type="file" id="bizImage" accept="image/*">

    <button onclick="addBusiness()">Submit Business</button>
</div>
