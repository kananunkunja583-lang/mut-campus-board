        <h1>Campus Reviews</h1>

<section class="review-form">
    <h2>Submit a Review</h2>

    <select id="category">
        <option>Hostels</option>
        <option>Lecturers</option>
        <option>Cafeteria</option>
        <option>Library</option>
        <option>Clubs</option>
        <option>Campus Events</option>
    </select>

    <!-- Star Rating -->
    <div class="stars" id="stars">
        <span onclick="rate(1)">★</span>
        <span onclick="rate(2)">★</span>
        <span onclick="rate(3)">★</span>
        <span onclick="rate(4)">★</span>
        <span onclick="rate(5)">★</span>
    </div>

    <textarea id="reviewText" placeholder="Write your review..."></textarea>
    <input type="file" id="media" accept="image/*,video/*,audio/*">
    <button onclick="addReview()">Submit Review</button>
</section>

<section class="filter">
    <select id="filterCategory" onchange="displayReviews()">
        <option value="All">All Categories</option>
        <option>Hostels</option>
        <option>Lecturers</option>
        <option>Cafeteria</option>
        <option>Library</option>
        <option>Clubs</option>
        <option>Campus Events</option>
    </select>
</section>

<section class="media-section">
<div class="video-block">
    <h2>Video Review</h2>
   <div class="video-item"><video width="600" controls>
        <source src="PHOTOS/video1.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
   </div>
    <div class="video-item"><video width="600" controls>

    </div>
     <div class="video-item"><iframe width="600" height="340"
        src="https://www.youtube.com/embed/bTUTruYWDGk"
        title="YouTube video"
        frameborder="0"
        allowfullscreen>
     </iframe></div>
</div>
